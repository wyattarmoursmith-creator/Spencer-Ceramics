    window.onData(function () {

        '<div class="j-entry__body">' +
          '<div class="j-entry__meta"><span class="label">' + p.date + '</span>' +
            '<span class="label">' + p.tag + '</span></div>' +
          '<div class="j-entry__title">' + p.title + '</div>' +
          '<p class="j-entry__excerpt">' + p.excerpt + '</p>' +
          '<span class="link-underline">Read <span>→</span></span>' +
