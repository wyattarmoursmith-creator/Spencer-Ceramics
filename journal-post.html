<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Journal — Spencer Ceramics</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=Schibsted+Grotesk:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/site.css" />
</head>
<body data-page="journal">

  <nav class="menu" aria-label="Mobile">
    <a href="shop.html">Shop</a>
    <a href="commissions.html">Commissions</a>
    <a href="about.html">Studio</a>
    <a href="journal.html">Journal</a>
    <a href="contact.html">Contact</a>
    <a href="cart.html">Cart</a>
  </nav>

  <nav class="nav nav--solid" aria-label="Primary">
    <a class="nav__brand wordmark" href="index.html">Spencer&nbsp;&nbsp;Ceramics</a>
    <div class="nav__links">
      <a href="shop.html">Shop</a>
      <a href="commissions.html">Commissions</a>
      <a href="about.html">Studio</a>
      <a href="journal.html">Journal</a>
      <a href="contact.html">Contact</a>
        <a class="nav__cart" href="cart.html">Cart&nbsp;(<span data-cart-count>0</span>)</a>
    </div>
    <button class="nav__burger" aria-label="Menu">☰</button>
  </nav>

  <div class="article-hero"><img id="a-hero" src="images/j-hero.jpg" alt="" /></div>

  <article class="article" data-article-root>
    <!-- filled by JS from ?id= -->
  </article>

  <footer class="footer">
    <div class="footer__cell"><span>Spencer Ceramics</span><b data-site="year">MMXXVI</b></div>
    <div class="footer__cell"><span>Studio</span><b data-site="location">Auckland, NZ</b></div>
    <div class="footer__cell"><span>Journal</span><a href="journal.html">All notes →</a></div>
    <div class="footer__cell"><span>Instagram</span><a data-site="instagram" href="#">@spencer.ceramics</a></div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/media.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/site.js"></script>
  <script>
    window.onData(function () {
      var id = new URLSearchParams(location.search).get("id");
      var p = window.postById(id) || window.JOURNAL[0];
      document.title = p.title + " — Spencer Ceramics · Journal";
      document.getElementById("a-hero").src = p.img;
      document.getElementById("a-hero").alt = p.title;
      document.getElementById("a-hero").setAttribute("data-media", p.id);
      if(window.applyFocus) window.applyFocus();

      document.querySelector("[data-article-root]").innerHTML =
        '<div class="article__meta"><span class="label">' + p.date + '</span>' +
          '<span class="label">' + p.tag + '</span></div>' +
        '<h1 class="article__title">' + p.title + '</h1>' +
        '<div class="article__lede">' +
          (p.body || "").split(/\n{2,}/).map(function (para) { return '<p>' + para.trim() + '</p>'; }).join("") +
        '</div>' +
        '<div class="article__foot">' +
          '<a class="link-underline" href="journal.html"><span>←</span> All notes</a>' +
          '<a class="link-underline" href="shop.html">Shop the work <span>→</span></a>' +
        '</div>';
    });
  </script>
</body>
</html>
