# ============================================================
# Spencer Ceramics — CMS configuration (Decap CMS)
# Edits commit to GitHub; Netlify rebuilds; the site updates.
# Paths below are relative to the REPO ROOT — the site now lives at
# the repo root, so they have no folder prefix.
# ============================================================

backend:
  name: github
  repo: wyattarmoursmith-creator/Spencer-Ceramics
  branch: main

# Where CMS-uploaded photos are saved (in the repo) …
media_folder: "images"
# … and the URL they’re served from on the live site.
public_folder: "/images"

site_url: https://spencerceramics.netlify.app
display_url: https://spencerceramics.netlify.app
publish_mode: simple

collections:
  # ---------------- SHOP lives in Shopify now (Storefront API) — no CMS collection ----------------

  # ---------------- JOURNAL ----------------
  - name: journal
    label: "Journal — Posts"
    delete: false
    files:
      - name: posts
        label: "All posts"
        file: "content/journal.json"
        description: "Write and edit journal notes."
        fields:
          - label: "Posts"
            name: posts
            widget: list
            label_singular: "Post"
            summary: "{{fields.title}} — {{fields.date}}"
            fields:
              - { label: "ID / URL slug", name: id, widget: string, hint: "Unique, no spaces. e.g. winter-kiln" }
              - { label: "Title", name: title, widget: string }
              - { label: "Date", name: date, widget: string, hint: "Free text, e.g. June 2026" }
              - { label: "Tag", name: tag, widget: string, hint: "e.g. Firing, Process, Studio" }
              - { label: "Photo", name: img, widget: image, choose_url: false }
              - { label: "Excerpt", name: excerpt, widget: text, hint: "One line shown in the journal list." }
              - { label: "Body", name: body, widget: text, hint: "Separate paragraphs with a blank line." }

  # ---------------- SITE PHOTOS ----------------
  - name: site
    label: "Site Photos"
    files:
      - name: photos
        label: "Homepage & studio photos"
        file: "content/site.json"
        description: "Swap the big feature photos. Upload, then Publish."
        fields:
          - label: "Photos"
            name: images
            widget: object
            fields:
              - { label: "Homepage — Hero 1 (wide)", name: hero, widget: image }
              - { label: "Homepage — Hero 2 (wide)", name: "hero-2", widget: image }
              - { label: "Homepage — Hero 3 (wide)", name: "hero-3", widget: image }
              - { label: "Homepage — Studio (portrait)", name: studio, widget: image }
              - { label: "About — Portrait (tall)", name: about, widget: image }
              - { label: "Process 1 — The wheel", name: process-1, widget: image }
              - { label: "Process 2 — The glaze", name: process-2, widget: image }
              - { label: "Process 3 — The firing", name: process-3, widget: image }
              - { label: "Commissions — Hero (wide)", name: "commission-hero", widget: image }
              - { label: "Commissions — Pendant", name: "commission-pendant", widget: image }
              - { label: "Commissions — Wall", name: "commission-wall", widget: image }
              - { label: "Commissions — Table & floor", name: "commission-lamps", widget: image }
              - { label: "Home gallery — 1", name: "gallery-1", widget: image }
              - { label: "Home gallery — 2", name: "gallery-2", widget: image }
              - { label: "Home gallery — 3", name: "gallery-3", widget: image }
              - { label: "Home gallery — 4", name: "gallery-4", widget: image }
              - { label: "Studio page — Selected work 1", name: "work-1", widget: image }
              - { label: "Studio page — Selected work 2", name: "work-2", widget: image }
              - { label: "Studio page — Selected work 3", name: "work-3", widget: image }
              - { label: "Studio page — Selected work 4", name: "work-4", widget: image }

  # ---------------- SITE & CONTACT ----------------
  - name: settings
    label: "Site & Contact"
    files:
      - name: contact
        label: "Contact details & footer"
        file: "content/settings.json"
        description: "Email, Instagram, and studio location — shown in the footer of every page and on the Contact page."
        fields:
          - { label: "Email", name: email, widget: string }
          - { label: "Instagram handle", name: instagram_handle, widget: string, hint: "e.g. @spencer.ceramics" }
          - { label: "Instagram link", name: instagram_url, widget: string, hint: "Full URL to the Instagram profile" }
          - { label: "Studio location", name: location, widget: string, hint: "Shown in the footer, e.g. Mt. Wellington, AU" }
          - { label: "Footer year", name: year, widget: string, hint: "Roman numerals in the footer, e.g. MMXXVI" }
          - { label: "Contact page — intro line", name: contact_intro, widget: text }

  # ---------------- PAGE TEXT ----------------
  - name: pages
    label: "Page Text"
    files:
      - name: pages
        label: "Headlines & intro copy"
        file: "content/pages.json"
        description: "The wording on each page — hero headlines, the shop edition heading, the Commissions copy. (Photos live under Site Photos; products under Shop.)"
        fields:
          - label: "Home"
            name: home
            widget: object
            collapsed: true
            fields:
              - { label: "Hero — small label", name: hero_label, widget: string }
              - { label: "Hero — headline", name: hero_heading, widget: text, hint: "Each line you type shows on its own line." }
              - { label: "Hero — release note", name: hero_cta, widget: string }
              - { label: "Studio — heading", name: studio_heading, widget: text }
              - { label: "Studio — paragraph", name: studio_body, widget: text }
              - { label: "Selected work — heading", name: selected_heading, widget: text }
          - label: "Shop"
            name: shop
            widget: object
            collapsed: true
            fields:
              - { label: "Edition label", name: label, widget: string, hint: "e.g. Edition N° 042 — June 2026" }
              - { label: "Heading", name: heading, widget: text }
          - label: "About / Studio"
            name: about
            widget: object
            collapsed: true
            fields:
              - { label: "Statement (opening line)", name: statement1, widget: text }
              - { label: "Maker bio", name: bio, widget: text, hint: "Leave a blank line between paragraphs." }
          - label: "Commissions"
            name: commissions
            widget: object
            collapsed: true
            fields:
              - { label: "Hero — label", name: hero_label, widget: string }
              - { label: "Hero — headline", name: hero_heading, widget: text }
              - { label: "Intro", name: intro, widget: text }
              - { label: "Pendant — title", name: pendant_title, widget: text }
              - { label: "Pendant — description", name: pendant_body, widget: text, hint: "Leave a blank line between paragraphs." }
              - { label: "Wall — title", name: wall_title, widget: text }
              - { label: "Wall — description", name: wall_body, widget: text, hint: "Leave a blank line between paragraphs." }
              - { label: "Table & floor — title", name: lamps_title, widget: text }
              - { label: "Table & floor — description", name: lamps_body, widget: text, hint: "Leave a blank line between paragraphs." }
              - { label: "Closer line", name: closer, widget: text }
